<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheraSquare - Premium Practice EMR</title>
    <meta name="description" content="Modern Therapy Practice Management Platform for Mental Health Professionals ">
    <meta property="og:title" content="TheraSquare">
    <meta property="og:description" content="Modern Therapy Practice Management Platform for Mental Health Professionals">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.therapy.ke/">
    <meta property="og:image" content="https://www.therapy.ke/images/brand/therasquare-logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.therapy.ke/">
    <link rel="icon" type="image/png" href="/images/brand/therasquare-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- 
      Netlify Forms Detection Template:
      This static clone is registered at build time by Netlify's crawler.
      It matching labels, input elements, names, and honeypot structures.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden style="display: none">
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
      <button type="submit">Submit</button>
    </form>

    <!-- 
      Netlify Forms Detection Template: Signup
    -->
    <form name="signup" data-netlify="true" netlify-honeypot="bot-field" hidden style="display: none">
      <input type="hidden" name="form-name" value="signup" />
      <input type="text" name="contactPerson" />
      <input type="text" name="clinicName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subdomain" />
      <input type="text" name="initials" />
      <input type="text" name="planType" />
      <input type="text" name="billingCycle" />
      <input type="text" name="fullSubdomain" />
      <input type="text" name="subscriptionDetails" />
      <input type="text" name="expiryDate" />
      <input type="text" name="bot-field" />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
